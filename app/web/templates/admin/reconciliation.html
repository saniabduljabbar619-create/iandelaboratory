{% extends "layouts/base.html" %}

{% block page_css %}
<link rel="stylesheet" href="/static/css/reconciliation.css">
{% endblock %}

{% block content %}
<div class="reconcile-container">
    <header class="page-header">
        <h1>Payments & Reconciliation</h1>
        <div class="filter-group">
            <input type="date" id="startDate" class="sx-input">
            <input type="date" id="endDate" class="sx-input">
            <button onclick="loadReconciliation()" class="btn-primary">Filter</button>
        </div>
    </header>

    <div class="summary-grid" id="summaryGrid">
        <div class="summary-card total">
            <label>Total Revenue</label>
            <h2 id="totalAmount">₦0.00</h2>
        </div>
        <div class="summary-card">
            <label>Cash</label>
            <h2 id="cashAmount">₦0.00</h2>
        </div>
        <div class="summary-card">
            <label>Transfer/POS</label>
            <h2 id="transferAmount">₦0.00</h2>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="sx-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Reference</th>
                    <th>Method</th>
                    <th>Amount</th>
                    <th>Staff</th>
                </tr>
            </thead>
            <tbody id="paymentTableBody">
                </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block page_js %}
<script>
    async function loadReconciliation() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        
        let url = '/admin/payments/reconcile';
        const params = new URLSearchParams();
        if (start) params.append('start_date', start);
        if (end) params.append('end_date', end);
        if (params.toString()) url += `?${params.toString()}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            renderUI(data);
        } catch (err) {
            console.error("Failed to load reconciliation data", err);
        }
    }

    function renderUI(data) {
    // Helper to get value regardless of case
    const getVal = (key) => data.summary[key] || data.summary[key.toLowerCase()] || 0;

    const total = data.summary.total || 0;
    const cash = getVal('Cash');
    const transfer = getVal('Transfer');
    const pos = getVal('POS');

    document.getElementById('totalAmount').innerText = `₦${total.toLocaleString()}`;
    document.getElementById('cashAmount').innerText = `₦${cash.toLocaleString()}`;
    document.getElementById('transferAmount').innerText = `₦${(transfer + pos).toLocaleString()}`;

    const tbody = document.getElementById('paymentTableBody');
    if (!data.payments || data.payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No payments found for this range.</td></tr>';
        return;
    }

    tbody.innerHTML = data.payments.map(p => `
        <tr>
            <td>${new Date(p.created_at).toLocaleDateString()}</td>
            <td><small>${p.reference || p.notes || 'N/A'}</small></td>
            <td><span class="badge ${p.method.toLowerCase()}">${p.method}</span></td>
            <td><strong>₦${(p.amount || 0).toLocaleString()}</strong></td>
            <td>${p.staff_name || p.created_by_name || 'System'}</td>
        </tr>
    `).join('');
}
    // Initial Load for today
    document.addEventListener('DOMContentLoaded', loadReconciliation);
</script>
{% endblock %}
